<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Wiretap: Ollama Configuration</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Courier New', Courier, monospace; }
        .marquee-banner { background: #1a1a1a; color: #ff3333; padding: 5px; border-bottom: 2px solid #444; }
        .console { background: #000; border: 1px solid #00d4ff; padding: 15px; margin: 20px; box-shadow: 0 0 10px #00d4ff; }
        .highlight { color: #f1c40f; }
    </style>
</head>
<body>
    <div class="marquee-banner">
        <marquee>STREAMING STATUS: ENCRYPTED // PORT: 11435 // ORIGIN: WEBML-DEMO // DETECTIVE LOG: ACTIVE</marquee>
    </div>
    <div class="console">
        <h2>System Handshake Initialized</h2>
        <p>Target Host: <span class="highlight">127.0.0.1:11435</span></p>
        <p>Authorized Origin: <span class="highlight">https://webml-demo.vercel.app</span></p>
        <p>Status: <span class="highlight">Awaiting Model Load...</span></p>
    </div>
</body>
</html>
