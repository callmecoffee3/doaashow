<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOASHOW | Workstation v2.0</title>
    <style>
        :root {
            --win-blue: #0078d7;
            --win-bg: #ffffff;
            --win-sidebar: #f2f2f2;
            --win-border: #d1d1d1;
            --win-hover: #e5f3ff;
            --win-orange: #ff8c00;
        }

        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #004275; overflow: hidden; }

        /* Desktop Layer */
        #desktop { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: flex-start; padding: 20px; gap: 20px; }
        .desktop-app { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 1px 1px 2px #000; }
        .app-icon { font-size: 40px; display: block; margin-bottom: 5px; }
        .app-label { font-size: 11px; }

        /* Main Window Shell */
        #app-shell {
            position: absolute; top: 5vh; left: 5vw; width: 90vw; height: 85vh;
            background: var(--win-bg); display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid #555;
            transition: all 0.2s ease; z-index: 10;
        }
        #app-shell.minimized { height: 32px; width: 250px; transform: translateY(80vh); overflow: hidden; }
        #app-shell.fullscreen { width: 100vw; height: 100vh; top: 0; left: 0; }

        /* Title & Window Controls */
        .win-title { height: 32px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 12px; }
        .win-ctrl { display: flex; }
        .ctrl-btn { width: 46px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .ctrl-btn:hover { background: #e5e5e5; }
        .close-btn:hover { background: #e81123 !important; color: white; }

        /* Tab Bar */
        .tab-bar { background: #e1e1e1; display: flex; padding-top: 6px; border-bottom: 1px solid var(--win-border); }
        .tab { background: #d6d6d6; padding: 8px 15px; border: 1px solid var(--win-border); border-bottom: none; font-size: 11px; margin-left: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 100px; position: relative; }
        .tab.active { background: var(--win-bg); border-top: 2px solid var(--win-blue); }
        .add-tab { background: none; border: none; font-weight: bold; cursor: pointer; padding: 0 10px; color: #555; }

        /* Nav & Address Ribbon */
        .nav-ribbon { padding: 5px 10px; display: flex; gap: 8px; align-items: center; background: #fff; border-bottom: 1px solid #eee; }
        .address-bar { flex-grow: 1; border: 1px solid var(--win-border); padding: 4px 10px; display: flex; gap: 5px; font-size: 12px; color: #333; height: 22px; align-items: center; overflow: hidden; }
        .address-link { color: #000; cursor: pointer; text-decoration: none; }
        .address-link:hover { text-decoration: underline; color: var(--win-blue); }

        .bookmark-bar { height: 28px; background: #fff; border-bottom: 1px solid var(--win-border); display: flex; gap: 10px; padding: 0 15px; align-items: center; font-size: 11px; }

        /* Workspace Layout */
        .main-workspace { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 200px; background: var(--win-sidebar); border-right: 1px solid var(--win-border); padding: 10px; font-size: 11px; overflow-y: auto; }
        .side-title { font-weight: bold; color: #666; margin: 15px 0 5px 5px; text-transform: uppercase; font-size: 10px; }
        .side-link { padding: 6px 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-radius: 2px; }
        .side-link:hover { background: #e5e5e5; }

        .content-panel { flex-grow: 1; display: flex; flex-direction: column; background: #fff; }
        .toolbar { padding: 8px 15px; border-bottom: 1px solid #eee; display: flex; gap: 8px; background: #fcfcfc; }
        
        .file-grid { flex-grow: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; align-content: start; overflow-y: auto; }
        
        /* Items */
        .item { text-align: center; padding: 10px 5px; cursor: pointer; border: 1px solid transparent; position: relative; }
        .item:hover { background: var(--win-hover); border-color: #cce8ff; }
        .item.orange { border-left: 3px solid var(--win-orange); background: #fff9f2; }
        .item-icon { font-size: 36px; display: block; margin-bottom: 5px; }
        .item-name { font-size: 11px; word-break: break-all; color: #333; }
        
        .tool-overlay { position: absolute; top: 0; right: 0; display: none; background: #fff; border: 1px solid #ccc; z-index: 5; }
        .item:hover .tool-overlay { display: flex; flex-direction: column; }
        .t-btn { font-size: 10px; padding: 2px 5px; border: none; background: none; cursor: pointer; }
        .t-btn:hover { background: var(--win-blue); color: white; }

        .history-bar { height: 24px; background: #f0f0f0; border-top: 1px solid var(--win-border); display: flex; align-items: center; padding: 0 12px; font-size: 10px; color: #666; }
        .btn { background: #fff; border: 1px solid #ccc; padding: 3px 10px; font-size: 11px; cursor: pointer; }
        .btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-app" onclick="openApp()">
        <span class="app-icon">📁</span>
        <span class="app-label">DOASHOW Explorer</span>
    </div>
    <div class="desktop-app" onclick="alert('Launching Media Server...')">
        <span class="app-icon">🎬</span>
        <span class="app-label">Media Server</span>
    </div>
    <div class="desktop-app" onclick="alert('Idea Workshop Active')">
        <span class="app-icon">💡</span>
        <span class="app-label">Idea Workshop</span>
    </div>
</div>

<div id="app-shell">
    <div class="win-title">
        <div>📁 DOASHOW | This PC</div>
        <div class="win-ctrl">
            <div class="ctrl-btn" onclick="winMode('min')">―</div>
            <div class="ctrl-btn" onclick="winMode('max')">❐</div>
            <div class="ctrl-btn close-btn" onclick="winMode('cls')">✕</div>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar">
        <button class="add-tab" onclick="addNewTab()">+</button>
    </div>

    <div class="nav-ribbon">
        <button class="btn" onclick="goUp()">↑</button>
        <div class="address-bar" id="address-bar"></div>
        <input type="text" id="search-box" placeholder="Search DOASHOW..." onkeyup="runSearch()" style="width:180px; padding:3px;">
    </div>

    <div class="bookmark-bar" id="bookmark-bar">
        <span style="color:#888">⭐ Bookmarks:</span>
    </div>

    <div class="main-workspace">
        <div class="sidebar">
            <div class="side-title">Quick Access</div>
            <div id="quick-access-list"></div>
            
            <div class="side-title">Frequency (Heat)</div>
            <div id="freq-list"></div>

            <div class="side-title">DOASHOW PC</div>
            <div class="side-link" onclick="updateTabPath('portable-c')">💻 Portable (C:)</div>
            <div class="side-link" onclick="updateTabPath('storage-d')">💾 Storage (D:)</div>
            <div class="side-link" onclick="updateTabPath('device-a')">📱 Device (A:)</div>
            <div class="side-link" onclick="updateTabPath('mount-b')">🔌 Mount (B:)</div>
        </div>

        <div class="content-panel">
            <div class="toolbar">
                <button class="btn" onclick="addItem('folder')">New Folder</button>
                <button class="btn" onclick="addItem('file')">New File</button>
                <div style="flex-grow:1"></div>
                <button class="btn" onclick="sortData('asc')">Alphabetical Asc</button>
                <button class="btn" onclick="sortData('desc')">Alphabetical Desc</button>
            </div>
            
            <div id="file-grid" class="file-grid"></div>
            
            <div class="history-bar" id="history-log">System Ready.</div>
        </div>
    </div>
</div>

<script>
    const driveData = {
        'portable-c': {
            '0. Start': { type: 'folder', contents: {} },
            'A. activities': { type: 'folder', contents: {} },
            'B. posts': { type: 'folder', contents: {} },
            'C. OPERATIONS': { type: 'folder', contents: {}, orange: true },
            'D. online': { type: 'folder', contents: {} },
            'E. experiments': { type: 'folder', contents: {} },
            'F. Media outlets': { type: 'folder', contents: {} },
            'G. Names of Fighters': { type: 'folder', contents: {} },
            'H. People': { type: 'folder', contents: {} },
            'I. Nightmares': { type: 'folder', contents: {}, orange: true },
            'J. Clips': { type: 'folder', contents: {} },
            'K. Log': { type: 'folder', contents: {} },
            'L. Archives': { type: 'folder', contents: {} },
            'M. Projects': { type: 'folder', contents: {} },
            'N. Data': { type: 'folder', contents: {} },
            'O. Leads': { type: 'folder', contents: {} },
            'P. Profiles': { type: 'folder', contents: {} },
            'Q. Intel': { type: 'folder', contents: {} },
            'R. Reports': { type: 'folder', contents: {} },
            'S. Shortcuts': { type: 'folder', contents: {} },
            'T. Cenimatic Effects': { type: 'folder', contents: {} },
            'U. Most popular': { type: 'folder', contents: {} },
            'V. Most requested': { type: 'folder', contents: {} },
            'W. Current running projects': { type: 'folder', contents: {}, orange: true },
            'X. Storage': { type: 'folder', contents: {} },
            'Y. Network': { type: 'folder', contents: {} },
            'Z. something': { type: 'folder', contents: {} }
        },
        'storage-d': { 'Archives': { type: 'folder', contents: {} } },
        'device-a': {},
        'mount-b': {}
    };

    let tabs = [{ name: 'Portable (C:)', path: ['portable-c'], active: true }];
    let bookmarks = [];
    let frequency = {};

    function init() {
        renderTabs();
        renderExplorer();
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        const existing = bar.querySelectorAll('.tab');
        existing.forEach(e => e.remove());

        tabs.forEach((tab, index) => {
            const div = document.createElement('div');
            div.className = `tab ${tab.active ? 'active' : ''}`;
            div.innerHTML = `<span>📁 ${tab.name}</span>`;
            div.onclick = () => { activateTab(index); };
            bar.insertBefore(div, bar.querySelector('.add-tab'));
        });
    }

    function renderExplorer() {
        const activeTab = tabs.find(t => t.active);
        const grid = document.getElementById('file-grid');
        const addr = document.getElementById('address-bar');
        grid.innerHTML = '';
        
        // Address Bar Links
        addr.innerHTML = '<span class="address-link" onclick="updateTabPath(\'portable-c\')">DOASHOW</span> > ';
        activeTab.path.forEach((p, i) => {
            const span = document.createElement('span');
            span.className = 'address-link';
            span.innerText = p + ' > ';
            span.onclick = () => { activeTab.path = activeTab.path.slice(0, i+1); renderExplorer(); };
            addr.appendChild(span);
        });

        // Get Folder
        let current = driveData;
        activeTab.path.forEach(p => { 
            if(!current[p]) current[p] = { type: 'folder', contents: {} };
            current = current[p].contents || current[p]; 
        });

        // Render Items
        Object.keys(current).forEach(key => {
            if(['type', 'contents', 'orange'].includes(key)) return;
            const item = current[key];
            const div = document.createElement('div');
            div.className = `item ${item.orange ? 'orange' : ''}`;
            div.innerHTML = `
                <div class="tool-overlay">
                    <button class="t-btn" onclick="pinItem('${key}', event)">📌 Pin</button>
                    <button class="t-btn" onclick="markItem('${key}', event)">⭐ Bookmark</button>
                    <button class="t-btn" onclick="deleteItem('${key}', event)">✕ Delete</button>
                </div>
                <span class="item-icon">${item.type === 'folder' ? '📁' : '📄'}</span>
                <span class="item-name">${key}</span>
            `;
            div.onclick = () => {
                if(item.type === 'folder') {
                    activeTab.path.push(key);
                    activeTab.name = key;
                    frequency[key] = (frequency[key] || 0) + 1;
                    renderTabs();
                    renderExplorer();
                    log(`Mapsd to ${key}`);
                }
            };
            grid.appendChild(div);
        });

        updateSidebar();
    }

    function addNewTab() {
        tabs.forEach(t => t.active = false);
        tabs.push({ name: 'Portable (C:)', path: ['portable-c'], active: true });
        renderTabs();
        renderExplorer();
    }

    function activateTab(index) {
        tabs.forEach((t, i) => t.active = (i === index));
        renderTabs();
        renderExplorer();
    }

    function updateTabPath(p) {
        const activeTab = tabs.find(t => t.active);
        activeTab.path = p.split('/');
        activeTab.name = activeTab.path[activeTab.path.length-1];
        renderTabs();
        renderExplorer();
    }

    function addItem(type) {
        const name = prompt(`Enter ${type} name:`);
        if(!name) return;
        const current = getCurrentObj();
        current[name] = { type, contents: type === 'folder' ? {} : null, orange: false };
        renderExplorer();
    }

    function pinItem(name, e) {
        e.stopPropagation();
        const activeTab = tabs.find(t => t.active);
        const fullPath = activeTab.path.join('/') + '/' + name;
        if(!bookmarks.find(b => b.path === fullPath)) bookmarks.push({ name, path: fullPath });
        renderExplorer();
    }

    function updateSidebar() {
        const qa = document.getElementById('quick-access-list');
        qa.innerHTML = '';
        bookmarks.forEach(b => {
            const div = document.createElement('div');
            div.className = 'side-link';
            div.innerHTML = `📌 ${b.name}`;
            div.onclick = () => updateTabPath(b.path);
            qa.appendChild(div);
        });

        const bBar = document.getElementById('bookmark-bar');
        bBar.innerHTML = '<span style="color:#888">⭐ Pinned:</span>';
        bookmarks.forEach(b => {
            const span = document.createElement('span');
            span.className = 'address-link';
            span.style = "font-size: 11px; margin-left: 8px; background:#eee; padding: 2px 5px;";
            span.innerText = b.name;
            span.onclick = () => updateTabPath(b.path);
            bBar.appendChild(span);
        });

        const fList = document.getElementById('freq-list');
        fList.innerHTML = '';
        Object.entries(frequency).sort((a,b) => b[1]-a[1]).slice(0, 3).forEach(([name, count]) => {
            const div = document.createElement('div');
            div.className = 'side-link';
            div.innerHTML = `🔥 ${name} (${count})`;
            fList.appendChild(div);
        });
    }

    function sortData(dir) {
        const current = getCurrentObj();
        const keys = Object.keys(current).filter(k => !['type','contents','orange'].includes(k));
        keys.sort((a,b) => dir === 'asc' ? a.localeCompare(b) : b.localeCompare(a));
        const sorted = {};
        keys.forEach(k => sorted[k] = current[k]);
        // Re-inject sorted data into driveData
        const activeTab = tabs.find(t => t.active);
        let pRef = driveData;
        for(let i=0; i<activeTab.path.length-1; i++) pRef = pRef[activeTab.path[i]].contents;
        pRef[activeTab.path[activeTab.path.length-1]].contents = sorted;
        renderExplorer();
    }

    function getCurrentObj() {
        const activeTab = tabs.find(t => t.active);
        let cur = driveData;
        activeTab.path.forEach(p => { cur = cur[p].contents || cur; });
        return cur;
    }

    function goUp() { 
        const activeTab = tabs.find(t => t.active);
        if(activeTab.path.length > 1) { activeTab.path.pop(); renderExplorer(); }
    }

    function log(msg) { document.getElementById('history-log').innerText = `History: ${msg} | ${new Date().toLocaleTimeString()}`; }
    
    function winMode(m) {
        const s = document.getElementById('app-shell');
        if(m === 'min') s.classList.toggle('minimized');
        if(m === 'max') s.classList.toggle('fullscreen');
        if(m === 'cls') s.style.display = 'none';
    }

    function openApp() { document.getElementById('app-shell').style.display = 'flex'; }

    init();
</script>
</body>
</html>
