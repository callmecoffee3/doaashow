<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOASHOW | Advanced Windows 10 Explorer</title>
    <style>
        :root {
            --win-blue: #0078d7;
            --win-bg: #ffffff;
            --win-sidebar: #f0f0f0;
            --win-border: #d1d1d1;
            --win-hover: #e5f3ff;
            --win-orange: #ff8c00;
            --win-text: #000000;
        }

        body { margin: 0; height: 100vh; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* Window Controls & Shell */
        #app-shell {
            width: 95vw; height: 90vh; background: var(--win-bg);
            display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333; transition: all 0.2s ease;
        }
        #app-shell.minimized { height: 32px; width: 300px; overflow: hidden; transform: translateY(45vh); }
        #app-shell.fullscreen { width: 100vw; height: 100vh; }

        /* Header */
        .win-header { height: 32px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 12px; }
        .win-controls { display: flex; }
        .ctrl-btn { width: 45px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { background: #e5e5e5; }
        .close-btn:hover { background: #e81123 !important; color: white; }

        /* Tabs */
        .tab-bar { background: #e1e1e1; display: flex; padding-top: 5px; border-bottom: 1px solid var(--win-border); }
        .tab { background: var(--win-bg); padding: 8px 25px; border: 1px solid var(--win-border); border-bottom: none; font-size: 12px; margin-left: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* Nav & Address Bar */
        .nav-section { padding: 5px 10px; display: flex; gap: 8px; align-items: center; background: #fff; }
        .address-bar { flex-grow: 1; border: 1px solid var(--win-border); padding: 4px 10px; display: flex; gap: 5px; font-size: 13px; color: #555; height: 22px; align-items: center; }
        .address-link { color: #000; cursor: pointer; }
        .address-link:hover { text-decoration: underline; color: var(--win-blue); }

        .bookmark-bar { height: 28px; background: #fff; border-bottom: 1px solid var(--win-border); display: flex; gap: 12px; padding: 0 15px; align-items: center; font-size: 11px; }

        /* Layout */
        .main-body { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 200px; background: var(--win-sidebar); border-right: 1px solid var(--win-border); padding: 10px; font-size: 12px; overflow-y: auto; }
        .sidebar h5 { margin: 15px 0 5px 0; color: #666; font-size: 11px; text-transform: uppercase; }
        .side-item { padding: 4px 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .side-item:hover { background: #e5e5e5; }

        .content-area { flex-grow: 1; display: flex; flex-direction: column; background: #fff; }
        .toolbar { padding: 8px 15px; border-bottom: 1px solid #eee; display: flex; gap: 10px; background: #fdfdfd; }
        
        .file-grid { flex-grow: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; align-content: start; overflow-y: auto; }
        
        /* Items */
        .item { text-align: center; padding: 10px 5px; cursor: pointer; border: 1px solid transparent; position: relative; }
        .item:hover { background: var(--win-hover); border-color: #cce8ff; }
        .item.orange { border-bottom: 3px solid var(--win-orange); }
        .item-icon { font-size: 38px; display: block; margin-bottom: 5px; }
        .item-name { font-size: 11px; word-break: break-all; color: #333; }
        
        .item-actions { position: absolute; top: 0; right: 0; display: none; flex-direction: column; background: #fff; border: 1px solid #ccc; }
        .item:hover .item-actions { display: flex; }
        .act-btn { font-size: 10px; border: none; background: none; cursor: pointer; padding: 2px 5px; }
        .act-btn:hover { background: var(--win-blue); color: white; }

        .history-bar { height: 25px; background: #f0f0f0; border-top: 1px solid var(--win-border); display: flex; align-items: center; padding: 0 10px; font-size: 10px; color: #666; }
        
        .btn { background: #fff; border: 1px solid #ccc; padding: 3px 10px; font-size: 12px; cursor: pointer; }
        .btn:hover { background: #f0f0f0; border-color: #999; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="win-header">
        <div>📁 DOASHOW | This PC</div>
        <div class="win-controls">
            <div class="ctrl-btn" onclick="winCtrl('min')">―</div>
            <div class="ctrl-btn" onclick="winCtrl('exp')">❐</div>
            <div class="ctrl-btn close-btn" onclick="winCtrl('cls')">✕</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab" onclick="navTo('portable-c')">🖴 Portable (C:)</div>
        <div class="tab" onclick="navTo('storage-d')">🖴 Storage (D:)</div>
        <div class="tab" style="width: 20px; justify-content: center;">+</div>
    </div>

    <div class="nav-section">
        <button class="btn" onclick="goUp()">↑</button>
        <div class="address-bar" id="addr-bar"></div>
        <input type="text" id="search-input" placeholder="Search DOASHOW..." onkeyup="doSearch()" style="width:180px; padding:3px;">
    </div>

    <div class="bookmark-bar" id="bookmark-bar">
        <span style="color:#888; margin-right:5px;">⭐ Bookmarks:</span>
    </div>

    <div class="main-body">
        <div class="sidebar">
            <h5>Quick Access</h5>
            <div class="side-item" onclick="navTo('portable-c/0. Start')">⭐ 0. Start</div>
            <div class="side-item" onclick="navTo('portable-c/C. OPERATIONS')">🔥 OPERATIONS</div>
            
            <h5>Frequency</h5>
            <div id="frequency-list"></div>

            <h5>Devices</h5>
            <div class="side-item" onclick="navTo('portable-c')">💻 Portable (C:)</div>
            <div class="side-item" onclick="navTo('storage-d')">💾 Storage (D:)</div>
            <div class="side-item" onclick="navTo('device-a')">📱 Device (A:)</div>
            <div class="side-item" onclick="navTo('mount-b')">🔌 Mount (B:)</div>
        </div>

        <div class="content-area">
            <div class="toolbar">
                <button class="btn" onclick="createItem('folder')">New Folder</button>
                <button class="btn" onclick="createItem('file')">New File</button>
                <div style="width:1px; background:#ddd; margin:0 5px;"></div>
                <button class="btn" onclick="sortData('asc')">Sort Ascending</button>
                <button class="btn" onclick="sortData('desc')">Sort Descending</button>
            </div>
            
            <div id="grid" class="file-grid"></div>
            
            <div class="history-bar" id="status-bar">Ready. Monitoring DOASHOW file system...</div>
        </div>
    </div>
</div>

<script>
    // THE DIRECTORY MAP
    const driveData = {
        'portable-c': {
            '0. Start': { type: 'folder', contents: {} },
            'A. activities': { type: 'folder', contents: {} },
            'B. posts': { type: 'folder', contents: {} },
            'C. OPERATIONS': { type: 'folder', contents: {}, orange: true },
            'D. online': { type: 'folder', contents: {} },
            'E. experiments': { type: 'folder', contents: {} },
            'F. Media outlets': { type: 'folder', contents: {} },
            'G. Names of Fighters': { type: 'folder', contents: {} },
            'H. People': { type: 'folder', contents: {} },
            'I. Nightmares': { type: 'folder', contents: {}, orange: true },
            'J. Clips': { type: 'folder', contents: {} },
            'K. folder': { type: 'folder', contents: {} },
            'L. folder': { type: 'folder', contents: {} },
            'M. folder': { type: 'folder', contents: {} },
            'N. folder': { type: 'folder', contents: {} },
            'O. folder': { type: 'folder', contents: {} },
            'P. folder': { type: 'folder', contents: {} },
            'Q. folder': { type: 'folder', contents: {} },
            'R. folder': { type: 'folder', contents: {} },
            'S. Shortcuts': { type: 'folder', contents: {} },
            'T. Cenimatic Effects': { type: 'folder', contents: {} },
            'U. Most popular': { type: 'folder', contents: {} },
            'V. Most requested': { type: 'folder', contents: {} },
            'W. Current running projects': { type: 'folder', contents: {}, orange: true },
            'X. folder': { type: 'folder', contents: {} },
            'Y. folder': { type: 'folder', contents: {} },
            'Z. something': { type: 'folder', contents: {} }
        },
        'storage-d': { 'Archives': { type: 'folder', contents: {} }, 'Backups': { type: 'folder', contents: {} } },
        'device-a': {},
        'mount-b': {}
    };

    let currentPath = ['portable-c'];
    let bookmarks = [];
    let frequency = {}; // Tracks visits

    function render() {
        const grid = document.getElementById('grid');
        const addr = document.getElementById('addr-bar');
        grid.innerHTML = '';
        
        // Render Address Bar Links
        addr.innerHTML = '<span class="address-link" onclick="navTo(\'\')">DOASHOW</span> > ';
        currentPath.forEach((p, i) => {
            const span = document.createElement('span');
            span.className = 'address-link';
            span.innerText = p + ' > ';
            span.onclick = () => { currentPath = currentPath.slice(0, i + 1); render(); };
            addr.appendChild(span);
        });

        // Pointer
        let currentFolder = driveData;
        currentPath.forEach(p => { 
            if(!currentFolder[p]) currentFolder[p] = { type: 'folder', contents: {} };
            currentFolder = currentFolder[p].contents || currentFolder[p]; 
        });

        // Display
        Object.keys(currentFolder).forEach(key => {
            if(['type', 'contents', 'orange'].includes(key)) return;
            const item = currentFolder[key];
            const div = document.createElement('div');
            div.className = `item ${item.orange ? 'orange' : ''}`;
            
            div.innerHTML = `
                <div class="item-actions">
                    <button class="act-btn" onclick="toggleBookmark('${key}', event)">⭐</button>
                    <button class="act-btn" onclick="editItem('${key}', event)">E</button>
                    <button class="act-btn" onclick="deleteItem('${key}', event)">X</button>
                </div>
                <span class="item-icon">${item.type === 'folder' ? '📁' : '📄'}</span>
                <span class="item-name">${key}</span>
            `;

            div.onclick = () => {
                if(item.type === 'folder') {
                    trackFreq(key);
                    currentPath.push(key);
                    updateStatus(`Mapsd to ${key}`);
                    render();
                }
            };
            grid.appendChild(div);
        });

        renderBookmarks();
        renderFreq();
    }

    function trackFreq(name) {
        frequency[name] = (frequency[name] || 0) + 1;
    }

    function renderFreq() {
        const list = document.getElementById('frequency-list');
        list.innerHTML = '';
        Object.entries(frequency)
            .sort((a,b) => b[1] - a[1])
            .slice(0, 5)
            .forEach(([name, count]) => {
                const div = document.createElement('div');
                div.className = 'side-item';
                div.innerHTML = `🕒 ${name} (${count})`;
                list.appendChild(div);
            });
    }

    function createItem(type) {
        const name = prompt(`New ${type} name:`);
        if(!name) return;
        let current = getCurrentObj();
        current[name] = { type, contents: type === 'folder' ? {} : null, orange: false };
        updateStatus(`Created ${type}: ${name}`);
        render();
    }

    function deleteItem(name, e) {
        e.stopPropagation();
        if(confirm(`Erase ${name}?`)) {
            delete getCurrentObj()[name];
            render();
        }
    }

    function toggleBookmark(name, e) {
        e.stopPropagation();
        const path = currentPath.join('/') + '/' + name;
        if(!bookmarks.includes(path)) bookmarks.push(path);
        render();
    }

    function renderBookmarks() {
        const bar = document.getElementById('bookmark-bar');
        bar.innerHTML = '<span style="color:#888; margin-right:5px;">⭐ Pinned:</span>';
        bookmarks.forEach(path => {
            const name = path.split('/').pop();
            const span = document.createElement('div');
            span.className = 'address-link';
            span.style = "font-size: 11px; background: #eee; padding: 2px 5px; border-radius: 3px;";
            span.innerText = name;
            span.onclick = () => { currentPath = path.split('/'); render(); };
            bar.appendChild(span);
        });
    }

    function sortData(dir) {
        let current = getCurrentObj();
        const keys = Object.keys(current).filter(k => !['type','contents','orange'].includes(k));
        keys.sort((a,b) => dir === 'asc' ? a.localeCompare(b) : b.localeCompare(a));
        
        // Rebuild object for order preservation
        const sorted = {};
        keys.forEach(k => { sorted[k] = current[k]; });
        
        // This visualizes the sorted order
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        keys.forEach(key => { /* Rendering logic repeated here for sorted keys */ });
        render(); 
    }

    function getCurrentObj() {
        let current = driveData;
        currentPath.forEach(p => { current = current[p].contents || current; });
        return current;
    }

    function doSearch() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const items = document.querySelectorAll('.item');
        items.forEach(it => {
            const name = it.querySelector('.item-name').innerText.toLowerCase();
            it.style.display = name.includes(term) ? 'block' : 'none';
        });
    }

    function winCtrl(mode) {
        const shell = document.getElementById('app-shell');
        if(mode === 'min') shell.classList.toggle('minimized');
        if(mode === 'exp') shell.classList.toggle('fullscreen');
        if(mode === 'cls') {
            if(confirm("Exit DOASHOW Workstation?")) shell.style.display = 'none';
        }
    }

    function goUp() { if(currentPath.length > 1) { currentPath.pop(); render(); } }
    function navTo(p) { currentPath = p ? p.split('/') : ['portable-c']; render(); }
    function updateStatus(msg) { document.getElementById('status-bar').innerText = `History: ${msg} | ${new Date().toLocaleTimeString()}`; }

    render();
</script>
</body>
</html>
