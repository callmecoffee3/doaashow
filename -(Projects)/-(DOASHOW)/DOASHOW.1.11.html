<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOASHOW | Workstation v3.0</title>
    <style>
        :root {
            --win-blue: #0078d7;
            --win-bg: #ffffff;
            --win-sidebar: #f3f3f3;
            --win-border: #d1d1d1;
            --win-hover: #e5f3ff;
            --win-orange: #ff8c00;
        }

        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #005a9e; overflow: hidden; }

        /* Desktop */
        #desktop { width: 100vw; height: 100vh; position: relative; padding: 25px; display: grid; grid-template-rows: repeat(auto-fill, 90px); gap: 15px; }
        .desktop-icon { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 1px 1px 3px #000; }
        .d-icon { font-size: 42px; display: block; }
        .d-label { font-size: 11px; margin-top: 5px; font-weight: 500; }

        /* Window Shell */
        #app-shell {
            position: absolute; top: 40px; left: 60px; width: 92vw; height: 88vh;
            background: var(--win-bg); display: flex; flex-direction: column;
            box-shadow: 0 12px 45px rgba(0,0,0,0.7); border: 1px solid #444;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        #app-shell.minimized { height: 32px; width: 280px; transform: translateY(85vh); overflow: hidden; }
        #app-shell.fullscreen { width: 100vw; height: 100vh; top: 0; left: 0; }

        /* Window Controls */
        .win-title { height: 32px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding-left: 10px; font-size: 12px; border-bottom: 1px solid #ddd; }
        .ctrl-group { display: flex; }
        .ctrl-btn { width: 45px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ctrl-btn:hover { background: #e5e5e5; }
        .close-btn:hover { background: #e81123 !important; color: white; }

        /* Tab Bar */
        .tab-bar { background: #e1e1e1; display: flex; padding-top: 5px; border-bottom: 1px solid var(--win-border); overflow-x: auto; }
        .tab { background: #dcdcdc; padding: 8px 15px; border: 1px solid var(--win-border); border-bottom: none; font-size: 11px; margin-left: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 120px; white-space: nowrap; }
        .tab.active { background: var(--win-bg); border-top: 2px solid var(--win-blue); }
        .tab-add { padding: 0 10px; font-weight: bold; cursor: pointer; border: none; background: none; }

        /* Nav & Ribbon */
        .ribbon { background: #fff; padding: 6px 10px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #eee; }
        .addr-bar { flex-grow: 1; border: 1px solid var(--win-border); padding: 4px 12px; display: flex; gap: 6px; font-size: 12px; align-items: center; height: 22px; background: #fff; overflow: hidden; }
        .addr-link { color: #000; cursor: pointer; text-decoration: none; }
        .addr-link:hover { color: var(--win-blue); text-decoration: underline; }

        .bookmark-strip { height: 26px; background: #fff; border-bottom: 1px solid var(--win-border); display: flex; gap: 10px; padding: 0 15px; align-items: center; font-size: 11px; }

        /* Workspace */
        .workspace { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 210px; background: var(--win-sidebar); border-right: 1px solid var(--win-border); padding: 10px; overflow-y: auto; font-size: 12px; }
        .sidebar-h { font-weight: bold; color: #555; font-size: 10px; text-transform: uppercase; margin: 15px 0 5px 5px; }
        .side-row { padding: 6px 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 3px; }
        .side-row:hover { background: #e5e5e5; }

        .content-area { flex-grow: 1; display: flex; flex-direction: column; background: #fff; }
        .action-strip { padding: 8px 15px; border-bottom: 1px solid #eee; display: flex; gap: 10px; background: #fafafa; }
        .file-grid { flex-grow: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 15px; align-content: start; overflow-y: auto; }
        
        /* Items */
        .item { text-align: center; padding: 12px 5px; cursor: pointer; border: 1px solid transparent; position: relative; }
        .item:hover { background: var(--win-hover); border-color: #cce8ff; }
        .item.orange { border-bottom: 3px solid var(--win-orange); background: #fffcf8; }
        .i-icon { font-size: 38px; display: block; margin-bottom: 8px; }
        .i-name { font-size: 11px; color: #333; word-break: break-all; }
        
        .i-tools { position: absolute; top: 0; right: 0; display: none; background: #fff; border: 1px solid #ccc; flex-direction: column; z-index: 10; }
        .item:hover .i-tools { display: flex; }
        .t-btn { font-size: 10px; border: none; background: none; padding: 4px 6px; cursor: pointer; }
        .t-btn:hover { background: var(--win-blue); color: white; }

        .history-bar { height: 24px; background: #f0f0f0; border-top: 1px solid var(--win-border); display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: #666; }
        .btn { background: #fff; border: 1px solid #ccc; padding: 3px 12px; font-size: 12px; cursor: pointer; }
        .btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-icon" onclick="openExplorer()">
        <span class="d-icon">📁</span>
        <span class="d-label">DOASHOW Explorer</span>
    </div>
    <div class="desktop-icon" onclick="alert('Launching Media Server...')">
        <span class="d-icon">📼</span>
        <span class="d-label">Media Server</span>
    </div>
    <div class="desktop-icon" onclick="alert('Launching Idea Workshop...')">
        <span class="d-icon">🛠️</span>
        <span class="d-label">Workshop</span>
    </div>
</div>

<div id="app-shell">
    <div class="win-title">
        <div>📁 DOASHOW | This PC</div>
        <div class="ctrl-group">
            <div class="ctrl-btn" onclick="winCtrl('min')">―</div>
            <div class="ctrl-btn" onclick="winCtrl('exp')">❐</div>
            <div class="ctrl-btn close-btn" onclick="winCtrl('cls')">✕</div>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar">
        <button class="tab-add" onclick="addTab()">+</button>
    </div>

    <div class="ribbon">
        <button class="btn" onclick="goUp()">↑</button>
        <div class="addr-bar" id="addr-bar"></div>
        <input type="text" id="search-in" placeholder="Search..." onkeyup="search()" style="width:160px; padding:3px;">
    </div>

    <div class="bookmark-strip" id="bookmark-strip">
        <span style="color:#888">⭐ Pinned:</span>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <div class="sidebar-h">Quick Access</div>
            <div id="pinned-list"></div>
            
            <div class="sidebar-h">Heat (Frequency)</div>
            <div id="heat-list"></div>

            <div class="sidebar-h">DOASHOW Devices</div>
            <div class="side-row" onclick="nav('portable-c')">💻 Portable (C:)</div>
            <div class="side-row" onclick="nav('storage-d')">💾 Storage (D:)</div>
            <div class="side-row" onclick="nav('device-a')">📱 Device (A:)</div>
            <div class="side-row" onclick="nav('mount-b')">🔌 Mount (B:)</div>

            <div class="sidebar-h">Network</div>
            <div class="side-row" onclick="alert('Connecting to Cloud Z...')">☁️ Cloud Z</div>
        </div>

        <div class="content-area">
            <div class="action-strip">
                <button class="btn" onclick="make('folder')">New Folder</button>
                <button class="btn" onclick="make('file')">New File</button>
                <div style="flex-grow:1"></div>
                <button class="btn" onclick="sort('asc')">A-Z</button>
                <button class="btn" onclick="sort('desc')">Z-A</button>
            </div>
            
            <div id="grid" class="file-grid"></div>
            
            <div class="history-bar" id="hist-log">Ready. All blind spots covered.</div>
        </div>
    </div>
</div>

<script>
    const system = {
        'portable-c': {
            '0. Start': { type: 'folder', contents: {} },
            'A. activities': { type: 'folder', contents: {} },
            'B. posts': { type: 'folder', contents: {} },
            'C. OPERATIONS': { type: 'folder', contents: {}, orange: true },
            'D. online': { type: 'folder', contents: {} },
            'E. experiments': { type: 'folder', contents: {} },
            'F. Media outlets': { type: 'folder', contents: {} },
            'G. Names of Fighters': { type: 'folder', contents: {} },
            'H. People': { type: 'folder', contents: {} },
            'I. Nightmares': { type: 'folder', contents: {}, orange: true },
            'J. Clips': { type: 'folder', contents: {} },
            'K. Log': { type: 'folder', contents: {} },
            'L. Data': { type: 'folder', contents: {} },
            'M. Projects': { type: 'folder', contents: {} },
            'N. Notes': { type: 'folder', contents: {} },
            'O. Leads': { type: 'folder', contents: {} },
            'P. Profiles': { type: 'folder', contents: {} },
            'Q. Intel': { type: 'folder', contents: {} },
            'R. Reports': { type: 'folder', contents: {} },
            'S. Shortcuts': { type: 'folder', contents: {} },
            'T. Cenimatic Effects': { type: 'folder', contents: {} },
            'U. Most popular': { type: 'folder', contents: {} },
            'V. Most requested': { type: 'folder', contents: {} },
            'W. Current running projects': { type: 'folder', contents: {}, orange: true },
            'X. Storage': { type: 'folder', contents: {} },
            'Y. Sync': { type: 'folder', contents: {} },
            'Z. something': { type: 'folder', contents: {} }
        },
        'storage-d': { 'Archives': { type: 'folder', contents: {} } },
        'device-a': {},
        'mount-b': {}
    };

    let tabs = [{ name: 'Portable (C:)', path: ['portable-c'], active: true }];
    let pinned = [];
    let bookmarks = [];
    let frequency = {};

    function start() {
        drawTabs();
        drawGrid();
    }

    function drawTabs() {
        const bar = document.getElementById('tab-bar');
        bar.querySelectorAll('.tab').forEach(t => t.remove());
        tabs.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tab ${t.active ? 'active' : ''}`;
            d.innerHTML = `<span>📁 ${t.name}</span>`;
            d.onclick = () => { tabs.forEach(x => x.active = false); t.active = true; start(); };
            bar.insertBefore(d, bar.querySelector('.tab-add'));
        });
    }

    function drawGrid() {
        const activeTab = tabs.find(t => t.active);
        const grid = document.getElementById('grid');
        const addr = document.getElementById('addr-bar');
        grid.innerHTML = '';
        
        // Address Bar
        addr.innerHTML = '<span class="addr-link" onclick="nav(\'portable-c\')">DOASHOW</span> > ';
        activeTab.path.forEach((p, i) => {
            const s = document.createElement('span');
            s.className = 'addr-link';
            s.innerText = p + ' > ';
            s.onclick = () => { activeTab.path = activeTab.path.slice(0, i+1); start(); };
            addr.appendChild(s);
        });

        // Resolve Folder
        let cur = system;
        activeTab.path.forEach(p => { 
            if(!cur[p]) cur[p] = { type: 'folder', contents: {} };
            cur = cur[p].contents || cur[p]; 
        });

        // Items
        Object.keys(cur).forEach(key => {
            if(['type','contents','orange'].includes(key)) return;
            const item = cur[key];
            const div = document.createElement('div');
            div.className = `item ${item.orange ? 'orange' : ''}`;
            div.innerHTML = `
                <div class="i-tools">
                    <button class="t-btn" onclick="pin('${key}', event)">📌 Pin</button>
                    <button class="t-btn" onclick="bmark('${key}', event)">⭐ Star</button>
                    <button class="t-btn" onclick="drop('${key}', event)">✕ Delete</button>
                </div>
                <span class="i-icon">${item.type === 'folder' ? '📁' : '📄'}</span>
                <span class="i-name">${key}</span>
            `;
            div.onclick = () => {
                if(item.type === 'folder') {
                    activeTab.path.push(key);
                    activeTab.name = key;
                    frequency[key] = (frequency[key] || 0) + 1;
                    log(`Moved to ${key}`);
                    start();
                }
            };
            grid.appendChild(div);
        });
        updateSidebars();
    }

    function addTab() {
        tabs.forEach(t => t.active = false);
        tabs.push({ name: 'DOASHOW', path: ['portable-c'], active: true });
        start();
    }

    function make(type) {
        const name = prompt(`Name for ${type}:`);
        if(!name) return;
        getCurObj()[name] = { type, contents: type === 'folder' ? {} : null, orange: false };
        start();
    }

    function pin(name, e) {
        e.stopPropagation();
        const path = tabs.find(t => t.active).path.join('/') + '/' + name;
        if(!pinned.find(p => p.path === path)) pinned.push({ name, path });
        start();
    }

    function bmark(name, e) {
        e.stopPropagation();
        const path = tabs.find(t => t.active).path.join('/') + '/' + name;
        if(!bookmarks.find(b => b.path === path)) bookmarks.push({ name, path });
        start();
    }

    function updateSidebars() {
        const pList = document.getElementById('pinned-list');
        pList.innerHTML = '';
        pinned.forEach(p => {
            const d = document.createElement('div');
            d.className = 'side-row';
            d.innerHTML = `📌 ${p.name}`;
            d.onclick = () => nav(p.path);
            pList.appendChild(d);
        });

        const bStrip = document.getElementById('bookmark-strip');
        bStrip.innerHTML = '<span style="color:#888">⭐ Pinned:</span>';
        bookmarks.forEach(b => {
            const s = document.createElement('span');
            s.className = 'addr-link';
            s.style = "font-size: 11px; margin-left: 10px; background:#eee; padding: 2px 5px;";
            s.innerText = b.name;
            s.onclick = () => nav(b.path);
            bStrip.appendChild(s);
        });

        const hList = document.getElementById('heat-list');
        hList.innerHTML = '';
        Object.entries(frequency).sort((a,b) => b[1]-a[1]).slice(0, 3).forEach(([n, c]) => {
            const d = document.createElement('div');
            d.className = 'side-row';
            d.innerHTML = `🔥 ${n} (${c})`;
            hList.appendChild(d);
        });
    }

    function sort(dir) {
        const cur = getCurObj();
        const keys = Object.keys(cur).filter(k => !['type','contents','orange'].includes(k));
        keys.sort((a,b) => dir === 'asc' ? a.localeCompare(b) : b.localeCompare(a));
        const sorted = {};
        keys.forEach(k => sorted[k] = cur[k]);
        const active = tabs.find(t => t.active);
        let pRef = system;
        for(let i=0; i<active.path.length-1; i++) pRef = pRef[active.path[i]].contents;
        pRef[active.path[active.path.length-1]].contents = sorted;
        start();
    }

    function getCurObj() {
        const active = tabs.find(t => t.active);
        let cur = system;
        active.path.forEach(p => { cur = cur[p].contents || cur; });
        return cur;
    }

    function nav(p) {
        const active = tabs.find(t => t.active);
        active.path = p.split('/');
        active.name = active.path[active.path.length-1];
        start();
    }

    function goUp() { 
        const active = tabs.find(t => t.active);
        if(active.path.length > 1) { active.path.pop(); start(); }
    }

    function log(msg) { document.getElementById('hist-log').innerText = `History: ${msg} | ${new Date().toLocaleTimeString()}`; }

    function winCtrl(m) {
        const s = document.getElementById('app-shell');
        if(m === 'min') s.classList.toggle('minimized');
        if(m === 'exp') s.classList.toggle('fullscreen');
        if(m === 'cls') s.style.display = 'none';
    }

    function openExplorer() { document.getElementById('app-shell').style.display = 'flex'; }

    function search() {
        const t = document.getElementById('search-in').value.toLowerCase();
        document.querySelectorAll('.item').forEach(it => {
            const name = it.querySelector('.i-name').innerText.toLowerCase();
            it.style.display = name.includes(t) ? 'block' : 'none';
        });
    }

    start();
</script>
</body>
</html>
